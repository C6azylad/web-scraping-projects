<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bella Italia — Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #fdf8f3;
      --warm-white: #fff9f4;
      --red: #c0392b;
      --red-dark: #a93226;
      --red-light: #fdecea;
      --gold: #c9a84c;
      --text: #1a1208;
      --text-muted: #7a6a55;
      --border: #ede5d8;
      --bubble-bot: #ffffff;
      --bubble-user: #c0392b;
      --shadow: 0 8px 32px rgba(100,60,20,0.10);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    .chat-wrap {
      width: 100%;
      max-width: 420px;
      height: 92vh;
      max-height: 780px;
      display: flex;
      flex-direction: column;
      background: var(--warm-white);
      border-radius: 24px;
      box-shadow: var(--shadow), 0 1px 0 rgba(255,255,255,0.8) inset;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    /* HEADER */
    .chat-header {
      background: var(--red);
      padding: 18px 20px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
    }
    .chat-header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold), transparent);
    }
    .avatar {
      width: 44px; height: 44px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      border: 2px solid rgba(255,255,255,0.3);
      flex-shrink: 0;
    }
    .header-info { flex: 1; }
    .header-name {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      color: #fff;
      font-weight: 600;
      letter-spacing: 0.2px;
    }
    .header-status {
      display: flex; align-items: center; gap: 5px;
      margin-top: 2px;
    }
    .status-dot {
      width: 7px; height: 7px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .status-text { font-size: 12px; color: rgba(255,255,255,0.8); }

    /* MESSAGES */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--red-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .bubble {
      max-width: 78%;
      padding: 11px 15px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
      background: var(--bubble-bot);
      box-shadow: 0 2px 8px rgba(100,60,20,0.07);
      border: 1px solid var(--border);
    }
    .bubble.user {
      background: var(--bubble-user);
      color: #fff;
      border-color: transparent;
      border-bottom-right-radius: 5px;
    }
    .bubble.bot { border-bottom-left-radius: 5px; }

    /* QUICK REPLIES */
    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 8px;
      padding-left: 36px;
      animation: fadeUp 0.4s ease 0.1s both;
    }
    .qr-btn {
      background: #fff;
      border: 1.5px solid var(--red);
      color: var(--red);
      padding: 7px 13px;
      border-radius: 20px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s ease;
      white-space: nowrap;
    }
    .qr-btn:hover {
      background: var(--red);
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(192,57,43,0.25);
    }
    .qr-btn:active { transform: translateY(0); }

    /* TYPING INDICATOR */
    .typing-row { display: flex; align-items: flex-end; gap: 8px; animation: fadeUp 0.3s ease; }
    .typing-bubble {
      background: var(--bubble-bot);
      border: 1px solid var(--border);
      border-radius: 18px;
      border-bottom-left-radius: 5px;
      padding: 12px 16px;
      display: flex; gap: 5px; align-items: center;
      box-shadow: 0 2px 8px rgba(100,60,20,0.07);
    }
    .typing-dot {
      width: 7px; height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: typingBounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* INPUT */
    .chat-input-area {
      padding: 12px 16px 16px;
      border-top: 1px solid var(--border);
      background: var(--warm-white);
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .chat-input {
      flex: 1;
      padding: 11px 16px;
      border: 1.5px solid var(--border);
      border-radius: 24px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      background: #fff;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .chat-input:focus { border-color: var(--red); }
    .chat-input::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 42px; height: 42px;
      background: var(--red);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s ease;
      flex-shrink: 0;
    }
    .send-btn:hover { background: var(--red-dark); transform: scale(1.05); }
    .send-btn:active { transform: scale(0.97); }
    .send-btn svg { width: 18px; height: 18px; fill: #fff; }

    .powered {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      padding: 0 0 10px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
<div class="chat-wrap">
  <div class="chat-header">
    <div class="avatar">🍝</div>
    <div class="header-info">
      <div class="header-name">Bella Italia</div>
      <div class="header-status">
        <div class="status-dot"></div>
        <span class="status-text">Always here to help</span>
      </div>
    </div>
  </div>

  <div class="chat-messages" id="messages"></div>

  <div class="chat-input-area">
    <input class="chat-input" id="userInput" type="text" placeholder="Type a message…" autocomplete="off" />
    <button class="send-btn" onclick="sendMessage()" aria-label="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="powered">Powered by AI ✦ Bella Italia</div>
</div>

<script>
const RESTAURANT = {
  name: "Bella Italia",
  phone: "919876543210",
  hours: "9 AM – 10 PM, every day",
  menu: "https://bellaitalia.com/menu",
  maps: "https://maps.google.com/?q=Bella+Italia+Restaurant",
};

const SYSTEM_PROMPT = `You are a warm, helpful assistant for ${RESTAURANT.name} restaurant.
Only answer questions related to the restaurant.
Keep replies short (1-2 lines max), friendly, and use light emojis.
Hours: ${RESTAURANT.hours}. 
For reservations, guide them to WhatsApp.
If someone asks something unrelated politely say you can only help with restaurant questions.`;

let conversationHistory = [];
let reservationState = null;

function waLink(people, time) {
  const msg = encodeURIComponent(`Hi! I want to reserve a table for ${people} people at ${time}`);
  return `https://wa.me/${RESTAURANT.phone}?text=${msg}`;
}

function appendMessage(role, content, withButtons) {
  const msgs = document.getElementById("messages");

  const row = document.createElement("div");
  row.className = `msg-row ${role}`;

  if (role === "bot") {
    const av = document.createElement("div");
    av.className = "msg-avatar";
    av.textContent = "🍝";
    row.appendChild(av);
  }

  const bubble = document.createElement("div");
  bubble.className = `bubble ${role}`;
  bubble.innerHTML = content.replace(/\n/g, "<br>");
  row.appendChild(bubble);
  msgs.appendChild(row);

  if (withButtons) {
    const qr = document.createElement("div");
    qr.className = "quick-replies";
    withButtons.forEach(btn => {
      const b = document.createElement("button");
      b.className = "qr-btn";
      b.textContent = btn.label;
      b.onclick = () => { qr.remove(); handleQuickReply(btn.value); };
      qr.appendChild(b);
    });
    msgs.appendChild(qr);
  }

  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById("messages");
  const row = document.createElement("div");
  row.className = "typing-row";
  row.id = "typing";
  const av = document.createElement("div");
  av.className = "msg-avatar"; av.textContent = "🍝";
  const bubble = document.createElement("div");
  bubble.className = "typing-bubble";
  bubble.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  row.appendChild(av); row.appendChild(bubble);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

function handleQuickReply(value) {
  appendMessage("user", value);
  const responses = {
    "View Menu": {
      text: `Here's our menu 👇\n${RESTAURANT.menu}\nOur pasta and pizzas are customer favorites 🍝🍕\nWould you like to reserve a table?`,
      buttons: [{ label: "📞 Reserve a Table", value: "Reserve a Table" }, { label: "🕒 Opening Hours", value: "Opening Hours" }]
    },
    "Opening Hours": {
      text: `We're open ${RESTAURANT.hours} 😊\nYou're welcome anytime!\nWould you like to reserve a table?`,
      buttons: [{ label: "📞 Reserve a Table", value: "Reserve a Table" }, { label: "📍 Location", value: "Location" }]
    },
    "Location": {
      text: `You can find us here 👇\n${RESTAURANT.maps}\nEasy parking available 🚗\nWant me to help reserve a table?`,
      buttons: [{ label: "📞 Reserve a Table", value: "Reserve a Table" }, { label: "🍝 View Menu", value: "View Menu" }]
    },
    "Reserve a Table": {
      text: "Sure! I can help with that. 😊\nHow many people will be joining?",
      buttons: [
        { label: "1–2 people", value: "reserve_2" },
        { label: "3–4 people", value: "reserve_4" },
        { label: "5+ people", value: "reserve_5+" }
      ]
    }
  };

  if (value.startsWith("reserve_")) {
    const people = value.replace("reserve_", "");
    reservationState = { people };
    setTimeout(() => {
      appendMessage("bot", `Perfect! 🙌 What time would you like to come?`, [
        { label: "12:00 PM", value: `time_12:00 PM` },
        { label: "2:00 PM", value: `time_2:00 PM` },
        { label: "6:00 PM", value: `time_6:00 PM` },
        { label: "8:00 PM", value: `time_8:00 PM` }
      ]);
    }, 600);
    return;
  }

  if (value.startsWith("time_") && reservationState) {
    const time = value.replace("time_", "");
    const people = reservationState.people;
    reservationState = null;
    const link = waLink(people, time);
    setTimeout(() => {
      const msgs = document.getElementById("messages");
      const row = document.createElement("div");
      row.className = "msg-row bot";
      const av = document.createElement("div");
      av.className = "msg-avatar"; av.textContent = "🍝";
      const bubble = document.createElement("div");
      bubble.className = "bubble bot";
      bubble.innerHTML = `Got it! 🎉<br>Tap below to confirm your reservation on WhatsApp 👇`;
      row.appendChild(av); row.appendChild(bubble);
      msgs.appendChild(row);
      const qr = document.createElement("div");
      qr.className = "quick-replies";
      const a = document.createElement("a");
      a.href = link; a.target = "_blank";
      a.className = "qr-btn";
      a.style.background = "#25D366"; a.style.color = "#fff"; a.style.border = "none";
      a.textContent = "✅ Confirm on WhatsApp";
      qr.appendChild(a);
      msgs.appendChild(qr);
      msgs.scrollTop = msgs.scrollHeight;
    }, 600);
    return;
  }

  const r = responses[value];
  if (r) {
    setTimeout(() => appendMessage("bot", r.text, r.buttons), 700);
  }
}

async function sendMessage() {
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  appendMessage("user", text);
  showTyping();

  conversationHistory.push({ role: "user", content: text });

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, history: conversationHistory })
    });
    const data = await res.json();
    removeTyping();
    const reply = data.reply || "Sorry, I didn't catch that 😊";
    conversationHistory.push({ role: "assistant", content: reply });
    appendMessage("bot", reply, [
      { label: "🍝 View Menu", value: "View Menu" },
      { label: "📞 Reserve a Table", value: "Reserve a Table" }
    ]);
  } catch {
    removeTyping();
    appendMessage("bot", "Hmm, something went wrong. Please try again in a moment 😊");
  }
}

document.getElementById("userInput").addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});

// Initial greeting
window.addEventListener("load", () => {
  setTimeout(() => {
    appendMessage("bot",
      `Hi, welcome to Bella Italia 🇮🇹\nI can help you quickly with menu, timings, location, or reservations.\nChoose an option below or type your question 👇`,
      [
        { label: "🍝 View Menu", value: "View Menu" },
        { label: "🕒 Opening Hours", value: "Opening Hours" },
        { label: "📍 Location", value: "Location" },
        { label: "📞 Reserve a Table", value: "Reserve a Table" }
      ]
    );
  }, 400);
});
</script>
</body>
</html>
