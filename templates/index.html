<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bella Italia Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 400px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .chat-header { background: #c0392b; color: white; padding: 20px; text-align: center; }
        .chat-header h2 { font-size: 18px; }
        .chat-header p { font-size: 12px; opacity: 0.8; }
        .chat-messages { height: 400px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 14px; line-height: 1.4; }
        .bot-message { background: #f0f0f0; color: #333; align-self: flex-start; border-bottom-left-radius: 5px; }
        .user-message { background: #c0392b; color: white; align-self: flex-end; border-bottom-right-radius: 5px; }
        .chat-input { display: flex; padding: 15px; border-top: 1px solid #eee; gap: 10px; }
        .chat-input input { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 25px; outline: none; font-size: 14px; }
        .chat-input button { background: #c0392b; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-size: 14px; }
        .chat-input button:hover { background: #a93226; }
        .typing { font-style: italic; color: #999; font-size: 12px; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>🍕 Bella Italia Restaurant</h2>
            <p>Ask me anything about our restaurant!</p>
        </div>
        <div class="chat-messages" id="messages">
            <div class="message bot-message">Hello! Welcome to Bella Italia Restaurant. How can I help you today? 🍕</div>
        </div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Ask a question..." />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        document.getElementById("userInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const messages = document.getElementById("messages");
            const userText = input.value.trim();
            if (!userText) return;

            messages.innerHTML += `<div class="message user-message">${userText}</div>`;
            input.value = "";

            messages.innerHTML += `<div class="message bot-message typing" id="typing">Typing...</div>`;
            messages.scrollTop = messages.scrollHeight;

            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: userText })
            });

            const data = await response.json();
            document.getElementById("typing").remove();
            messages.innerHTML += `<div class="message bot-message">${data.reply}</div>`;
            messages.scrollTop = messages.scrollHeight;
        }
    </script>
</body>
</html>
